<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stickman Arena</title>
  <meta
    name="description"
    content="Canvas-based stickman arena game with AI-powered attack and accessory generation plus a built-in debug log."
  >
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <h1>Stickman Arena</h1>
      </div>
    </header>

    <div class="arena-layout">
      <aside class="side-column">
        <section id="attack-panel" class="panel attack-container">
          <div class="panel-heading">
            <h2 class="attack-header">Attack</h2>
          </div>
          <div class="family-block">
            <div class="ideas-title">Family</div>
            <div id="attack-family-selector" class="family-selector"></div>
            <p id="attack-family-description" class="family-description"></p>
          </div>
          <textarea id="attack-prompt-input" rows="3" placeholder="Example: green light sword" maxlength="300"></textarea>
          <button id="generate-attack-code">Generate Attack</button>
          <button id="reset-attack-button">Reset Attack</button>
          <div id="code-display-attack">Default attack loaded.</div>

          <details class="ideas-drawer">
            <summary class="ideas-summary">Quick ideas</summary>
            <div id="attack-ideas-list" class="idea-list">
              <span class="idea-placeholder">Loading ideas...</span>
            </div>
          </details>
        </section>
      </aside>

      <main class="arena-column">
        <section class="panel arena-panel">
          <div class="coach-panel" id="coach-panel">
            <div class="coach-copy">
              <p id="coach-kicker" class="coach-kicker">Step 1</p>
              <h2 id="coach-title" class="coach-title">Pick family</h2>
              <p id="coach-body" class="coach-body">Pick a family, generate one attack, then start the match.</p>
            </div>
            <div id="coach-status" class="coach-status">Setup</div>
          </div>

          <div class="step-rail">
            <button type="button" class="step-chip" data-step-id="family">1 Family</button>
            <button type="button" class="step-chip" data-step-id="attack">2 Build</button>
            <button type="button" class="step-chip" data-step-id="start">3 Start</button>
            <button type="button" class="step-chip" data-step-id="fight">4 Test</button>
          </div>

          <div class="arena-toolbar">
            <div id="difficulty-selector">
              <button class="difficulty-button easy selected" data-difficulty="easy">Easy</button>
              <button class="difficulty-button medium" data-difficulty="medium">Medium</button>
              <button class="difficulty-button hard" data-difficulty="hard">Hard</button>
            </div>

            <div class="ui-buttons-container">
              <button id="pause-play-button">Start Match</button>
              <button id="restart-button">Reset Match</button>
            </div>
          </div>

          <div class="arena-frame" id="arena-stage">
            <div class="arena-frame-label">
              <span class="arena-label">Arena</span>
            </div>
            <canvas id="gameCanvas" width="800" height="450"></canvas>
            <div
              id="loading-overlay"
              class="loading-overlay hidden"
              style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 18px;"
            >
              Building...
            </div>
          </div>

          <div class="controls">
            <p><strong>Move</strong> A D W <span class="controls-dot">/</span> <strong>Fire</strong> click</p>
          </div>
        </section>
      </main>

      <aside class="side-column side-column-right">
        <section id="accessory-panel" class="panel accessory-container">
          <div class="panel-heading">
            <h2 class="accessory-header">Gear</h2>
          </div>
          <textarea id="accessory-prompt-input" rows="3" placeholder="Example: sunglasses" maxlength="300"></textarea>
          <button id="generate-accessory-code">Generate Gear</button>
          <div id="code-display-accessory">No gear loaded.</div>

          <details class="ideas-drawer">
            <summary class="ideas-summary">Quick ideas</summary>
            <div id="accessory-ideas-list" class="idea-list">
              <span class="idea-placeholder">Loading ideas...</span>
            </div>
          </details>
        </section>

        <section class="panel debug-container">
          <div class="panel-heading">
            <h2 class="debug-header">Debug</h2>
          </div>
          <div id="debug-output"></div>
          <div class="debug-actions">
            <button id="clear-debug-button">Clear Log</button>
          </div>
        </section>
      </aside>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
